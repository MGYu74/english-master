                    start(controller) {
                        controller.enqueue(bytes);
                        controller.close();
                    }
                });
                
                const decompressedStream = stream.pipeThrough(new DecompressionStream('gzip'));
                const reader = decompressedStream.getReader();
                const decoder = new TextDecoder('utf-8');
                
                let htmlContent = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    htmlContent += decoder.decode(value, { stream: true });
                }
                htmlContent += decoder.decode(); // flush
                
                if (statusEl) statusEl.innerText = "正在載入介面與安全防拷常駐程式...";
                
                // 3. 覆寫 DOM 並執行網頁
                document.open();
                document.write(htmlContent);
                document.close();
                
                // 4. 動態注入防拷與防檢視指令
                injectProtections();
                
            } catch (err) {
                console.error("解密或解壓失敗:", err);
                document.getElementById('loader').innerHTML = `
                    <div class="error">
                        <h2 style="margin-top:0;font-size:1.3rem;">⚠️ 載入安全核心失敗</h2>
                        <p style="font-size:0.85rem;color:#7f1d1d;">此瀏覽器不支援原生解密串流 (DecompressionStream)。<br>請更新您的 iOS/Android 系統或更換為最新版 Chrome、Safari、Edge 瀏覽器開啟。</p>
                    </div>
                `;
            }
        }
        
        function injectProtections() {
            // 停用右鍵
            document.addEventListener('contextmenu', e => e.preventDefault());
            // 停用反白選擇文字（可視需求開啟，此處主要保護單字庫不被整頁複製）
            document.addEventListener('selectstart', e => {
                // 允許輸入框與單字卡上進行選取（不影響正常使用）
                const tag = e.target.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.classList.contains('select-all')) {
                    return;
                }
                e.preventDefault();
            });
            // 停用複製與剪下
            document.addEventListener('copy', e => e.preventDefault());
            document.addEventListener('cut', e => e.preventDefault());
            
            // 停用快捷鍵 F12 與 開發者工具組合鍵
            document.addEventListener('keydown', e => {
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && (e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C') || e.key === 'U')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        // 啟動加載
        window.addEventListener('DOMContentLoaded', () => {
            // 延遲 200ms 讓動畫順暢顯示再載入
            setTimeout(() => {
                decompressAndLoad(ENCRYPTED_HTML_DATA);
            }, 200);
        });
    </script>
</body>
